<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Now!</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class=" bg-dark vh-100 d-flex justify-content-center align-items-center">
    <!-- Container -->
    <div class="container mt-5">
      <!-- Card -->
      <div class="card bg-dark border-3 border-white p-4">
        
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h2 class="text-white fw-bold">Register Today</h2>
            <p class="text-white text-opacity-75">Fill in the data below.</p>
          </div>
        </div>

        <!-- Form -->
        <form>
          
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Full Name" />
          </div>

          <div class="mb-3">
            <input
              type="email"
              class="form-control"
              placeholder="E-mail Address"
            />
          </div>

          <div class="mb-3">
            <select class="form-select">
              <option selected disabled>Position</option>
              <option>Developer</option>
              <option>Designer</option>
              <option>Manager</option>
            </select>
          </div>

          <div class="mb-3">
            <input
              type="password"
              class="form-control"
              placeholder="Password"
            />
          </div>


          <div class="mb-3">
            <label class="me-2 text-white">Gender:</label>
            <div class="form-check form-check-inline">
              <input type="radio" name="gender" class="form-check-input" />
              <label class="form-check-label text-white">Male</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="radio" name="gender" class="form-check-input" />
              <label class="form-check-label text-white">Female</label>
            </div>
            <div class="form-check form-check-inline">
              <input type="radio" name="gender" class="form-check-input" />
              <label class="form-check-label text-white">Secret</label>
            </div>
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input"/>
            <label class="form-check-label text-white">
            I confirm that all data are correct
            </label>
          </div>

          <div class="mb-3">
            <button type="submit" class="btn btn-secondary">Register</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
